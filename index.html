<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESTATEX</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: black;
      color: white;
      width: 100%;
    }

    .delete {
      background: red;
    }
  </style>
</head>

<body>

<div class="container">

<h1>ESTATEX</h1>

<button onclick="loadListings()">Показать объявления</button>

<div id="list"></div>

<h2>Добавить объявление</h2>

<input placeholder="Название" id="title">
<input placeholder="Цена" id="price">
<input placeholder="Город" id="city">
<input placeholder="Описание" id="description">

<input type="file" id="image">

<button onclick="addListing()">Добавить</button>

</div>

<script>
const API = "https://estatex-3bez.onrender.com";

// 📥 загрузка
async function loadListings() {
  const res = await fetch(API + "/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="card">
        ${item.image ? `<img src="${API}/uploads/${item.image}">` : ""}
        <b>${item.title}</b> - $${item.price}<br>
        ${item.city}<br>
        ${item.description}<br>
        <button class="delete" onclick="deleteListing('${item._id}')">Удалить</button>
      </div>
    `;
  });
}

// ➕ добавление с фото
async function addListing() {
  const formData = new FormData();

  formData.append("title", document.getElementById("title").value);
  formData.append("price", document.getElementById("price").value);
  formData.append("city", document.getElementById("city").value);
  formData.append("description", document.getElementById("description").value);

  const file = document.getElementById("image").files[0];
  if (file) {
    formData.append("image", file);
  }

  await fetch(API + "/listings", {
    method: "POST",
    body: formData
  });

  loadListings();
}

// ❌ удалить
async function deleteListing(id) {
  await fetch(API + "/listings/" + id, {
    method: "DELETE"
  });

  loadListings();
}
</script>

</body>
</html>
