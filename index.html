<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ESTATEX</title>
</head>
<body>

<h1>ESTATEX</h1>

<button onclick="loadListings()">Показать объявления</button>

<div id="list"></div>

<h2>Добавить объявление</h2>

<input placeholder="Название" id="title"><br>
<input placeholder="Цена" id="price"><br>
<input placeholder="Город" id="city"><br>
<input placeholder="Описание" id="description"><br>

<button onclick="addListing()">Добавить</button>

<script>
const API = "https://estatex-3bez.onrender.com";

async function loadListings() {
  const res = await fetch(API + "/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div>
        <b>${item.title}</b> - $${item.price}<br>
        ${item.city}<br>
        ${item.description}<br>
        <button onclick="deleteListing('${item._id}')">Удалить</button>
        <hr>
      </div>
    `;
  });
}

async function addListing() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const city = document.getElementById("city").value;
  const description = document.getElementById("description").value;

  await fetch(API + "/listings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      price: Number(price),
      city,
      description
    })
  });

  loadListings();
}

async function deleteListing(id) {
  await fetch(API + "/listings/" + id, {
    method: "DELETE"
  });

  loadListings();
}
</script>

</body>
</html>
