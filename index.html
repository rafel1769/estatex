<!DOCTYPE html>
<html>
<head>
  <title>ESTATEX</title>
</head>
<body>

<h1>🏠 ESTATEX</h1>

<button onclick="loadListings()">Показать объявления</button>

<ul id="list"></ul>

<hr>

<h3>Добавить объявление</h3>

<input id="title" placeholder="Название">
<input id="price" placeholder="Цена" type="number">
<button onclick="addListing()">Добавить</button>

<script>
async function loadListings() {
  const res = await fetch("/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");
    li.innerText = item.title + " - $" + item.price;

    const btn = document.createElement("button");
    btn.innerText = "Удалить";
    btn.onclick = () => deleteListing(item.id);

    li.appendChild(btn);
    list.appendChild(li);
  });
}

async function addListing() {
  const title = document.getElementById("title").value;
  const price = Number(document.getElementById("price").value);

  await fetch("/listings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, price })
  });

  loadListings();
}

async function deleteListing(id) {
  await fetch("/listings/" + id, {
    method: "DELETE"
  });

  loadListings();
}
</script>

</body>
</html>
