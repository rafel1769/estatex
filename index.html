<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESTATEX</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: black;
      color: white;
      width: 100%;
    }

    .delete {
      background: red;
    }
  </style>
</head>

<body>

<div class="container">

<h1>ESTATEX</h1>

<button onclick="loadListings()">Показать объявления</button>

<div id="list"></div>

<h2>Добавить объявление</h2>

<input placeholder="Название" id="title">
<input placeholder="Цена" id="price">
<input placeholder="Город" id="city">
<input placeholder="Описание" id="description">

<button onclick="addListing()">Добавить</button>

</div>

<script>
const API = "https://estatex-3bez.onrender.com";

async function loadListings() {
  const res = await fetch(API + "/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="card">
        <b>${item.title}</b> - $${item.price}<br>
        ${item.city}<br>
        ${item.description}<br>
        <button class="delete" onclick="deleteListing('${item._id}')">Удалить</button>
      </div>
    `;
  });
}

async function addListing() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const city = document.getElementById("city").value;
  const description = document.getElementById("description").value;

  await fetch(API + "/listings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      price: Number(price),
      city,
      description
    })
  });

  loadListings();
}

async function deleteListing(id) {
  await fetch(API + "/listings/" + id, {
    method: "DELETE"
  });

  loadListings();
}
</script>

</body>
</html>
