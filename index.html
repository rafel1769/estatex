<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>ESTATEX</title><style>
body {
  font-family: Arial, sans-serif;
  padding: 15px;
  background: #f2f2f2;
}

h1 {
  text-align: center;
}

button {
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
}

button:hover {
  background: #0056b3;
}

input {
  display: block;
  margin: 5px 0;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  border: 1px solid #ccc;
}

li {
  background: white;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  list-style: none;
}

.delete-btn {
  background: red;
}
</style></head>
<body><h1>🏠 ESTATEX</h1><button onclick="loadListings()">📄 Показать объявления</button>

<ul id="list"></ul><hr><h3>➕ Добавить объявление</h3><input id="title" placeholder="Название">
<input id="price" type="number" placeholder="Цена">
<input id="city" placeholder="Город">
<input id="description" placeholder="Описание"><button onclick="addListing()">Добавить</button>

<script>

// загрузка объявлений
async function loadListings() {
  const res = await fetch("/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");

    li.innerHTML = `
      <b>${item.title}</b> — $${item.price}<br>
      📍 ${item.city || "-"}<br>
      📝 ${item.description || "-"}
    `;

    const btn = document.createElement("button");
    btn.innerText = "❌ Удалить";
    btn.className = "delete-btn";

    btn.onclick = async () => {
      await fetch("/listings/" + item.id, {
        method: "DELETE"
      });
      loadListings();
    };

    li.appendChild(btn);
    list.appendChild(li);
  });
}

// добавление объявления
async function addListing() {
  const title = document.getElementById("title").value;
  const price = Number(document.getElementById("price").value);
  const city = document.getElementById("city").value;
  const description = document.getElementById("description").value;

  if (!title || !price) {
    alert("Заполни название и цену");
    return;
  }

  await fetch("/listings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      price,
      city,
      description
    })
  });

  // очистка
  document.getElementById("title").value = "";
  document.getElementById("price").value = "";
  document.getElementById("city").value = "";
  document.getElementById("description").value = "";

  loadListings();
}

</script></body>
</html>
