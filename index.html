<!DOCTYPE html>
<html>
<head>
  <title>ESTATEX</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    li {
      background: white;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h1>🏠 ESTATEX</h1>

<button onclick="loadListings()">📄 Показать объявления</button>

<ul id="list"></ul>

<hr>

<h3>➕ Добавить объявление</h3>

<input id="title" placeholder="Название">
<input id="price" placeholder="Цена" type="number">
<input id="city" placeholder="Город">
<input id="description" placeholder="Описание">

<button onclick="addListing()">Добавить</button>

<script>
async function loadListings() {
  const res = await fetch("/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");

    li.innerHTML = `
      <b>${item.title}</b> — $${item.price} <br>
      📍 ${item.city || "-"} <br>
      📝 ${item.description || "-"}
    `;

    const btn = document.createElement("button");
    btn.innerText = "❌";
    btn.onclick = () => deleteListing(item._id);

    li.appendChild(btn);
    list.appendChild(li);
  });
}

async function addListing() {
  const title = document.getElementById("title").value;
  const price = Number(document.getElementById("price").value);
  const city = document.getElementById("city").value;
  const description = document.getElementById("description").value;

  await fetch("/listings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, price, city, description })
  });

  loadListings();
}

async function deleteListing(id) {
  await fetch("/listings/" + id, {
    method: "DELETE"
  });

  loadListings();
}
</script>

</body>
</html>
