<!DOCTYPE html>
<html>
<head>
  <title>ESTATEX</title>
</head>
<body>

<h1>🏠 ESTATEX</h1>

<button onclick="loadListings()">Показать объявления</button>

<ul id="list"></ul>

<hr>

<h3>Добавить объявление</h3>

<input id="title" placeholder="Название">
<input id="price" type="number" placeholder="Цена">
<input id="location" placeholder="Город">
<input id="description" placeholder="Описание">

<button onclick="addListing()">Добавить</button>

<script>
async function loadListings() {
  const res = await fetch("/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");

    li.innerHTML = `
      <b>${item.title}</b> — $${item.price}<br>
      📍 ${item.location || "Не указано"}<br>
      📝 ${item.description || "Нет описания"}
    `;

    const btn = document.createElement("button");
    btn.innerText = "Удалить";
    btn.onclick = () => deleteListing(item.id);

    li.appendChild(btn);
    list.appendChild(li);
  });
}

async function addListing() {
  const title = document.getElementById("title").value;
  const price = Number(document.getElementById("price").value);
  const location = document.getElementById("location").value;
  const description = document.getElementById("description").value;

  await fetch("/listings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, price, location, description })
  });

  loadListings();
}

async function deleteListing(id) {
  await fetch("/listings/" + id, {
    method: "DELETE"
  });

  loadListings();
}
</script>

</body>
</html>
