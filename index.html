<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESTATEX</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      cursor: pointer;
      background: black;
      color: white;
    }

    .delete {
      background: red;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>ESTATEX</h1>

  <button onclick="loadListings()">Показать объявления</button>

  <div id="list"></div>

  <h2>Добавить объявление</h2>

  <input id="title" placeholder="Название">
  <input id="price" placeholder="Цена">
  <input id="city" placeholder="Город">
  <input id="description" placeholder="Описание">
  <input type="file">

  <button onclick="addListing()">Добавить</button>
</div>

<script>
const API = "https://estatex-3bez.onrender.com";

// 📦 загрузка
async function loadListings() {
  const res = await fetch(API + "/listings");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="card">
        <b>${item.title}</b> - $${item.price}<br>
        ${item.city}<br>
        ${item.description}<br>
        ${item.image ? `<img src="${API}/uploads/${item.image}" width="100%">` : ""}
        <button class="delete" onclick="deleteListing('${item._id}')">Удалить</button>
      </div>
    `;
  });
}

// ➕ добавление (ИСПРАВЛЕНО)
async function addListing() {
  try {
    const formData = new FormData();

    formData.append("title", document.getElementById("title").value);
    formData.append("price", document.getElementById("price").value);
    formData.append("city", document.getElementById("city").value);
    formData.append("description", document.getElementById("description").value);

    const fileInput = document.querySelector("input[type='file']");
    if (fileInput.files[0]) {
      formData.append("image", fileInput.files[0]);
    }

    await fetch(API + "/listings", {
      method: "POST",
      body: formData
    });

    loadListings();

  } catch (err) {
    alert("Ошибка");
    console.log(err);
  }
}

// ❌ удаление
async function deleteListing(id) {
  await fetch(API + "/listings/" + id, {
    method: "DELETE"
  });

  loadListings();
}
</script>

</body>
</html>
